<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<title>Book Figures</title>
<style>body{font-family:sans-serif;max-width:1400px;margin:2em auto;padding:0 1em} h2{margin-top:2em} figure img{display:block} figcaption{margin-bottom:.25em;font-weight:bold}</style>
</head>
<body>
<h1>Book Figures</h1>
  <h2>Figure 5A: Screenshots of the search results for 蓮</h2>
  <p style="color:#888;font-style:italic;margin:.25em 0">Browser screenshot (web app, not matplotlib)</p>
  <div style="display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap">
    <figure style="flex:1;min-width:200px;margin:0"><figcaption style="font-size:.85em;color:#555">PNG</figcaption><img src="Figure_5a.png" style="max-width:100%;border:1px solid #ccc"></figure>
    <figure style="flex:1;min-width:200px;margin:0"><figcaption style="font-size:.85em;color:#555">SVG</figcaption><img src="Figure_5a.svg" style="max-width:100%;border:1px solid #ccc"></figure>
  </div>
  <h2>Figure 5B: Screenshots of the search results for 蓮</h2>
  <p style="color:#888;font-style:italic;margin:.25em 0">Browser screenshot (web app, not matplotlib)</p>
  <div style="display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap">
    <figure style="flex:1;min-width:200px;margin:0"><figcaption style="font-size:.85em;color:#555">PNG</figcaption><img src="Figure_5b.png" style="max-width:100%;border:1px solid #ccc"></figure>
    <figure style="flex:1;min-width:200px;margin:0"><figcaption style="font-size:.85em;color:#555">SVG</figcaption><img src="Figure_5b.svg" style="max-width:100%;border:1px solid #ccc"></figure>
  </div>
</body>
</html>
